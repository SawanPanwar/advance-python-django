<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
{% include "header.html" %}
<form method="POST">
    {% csrf_token %}
    <div align="center">
        <h1>Login</h1>
        <h3><font color="red">{{ message }}</font></h3>
        <table>
            <tr>
                <th>UserName:</th>
                <td><input type="text" name="userName" placeholder="enter username here"></td>
            </tr>
            <tr>
                <th>Password:</th>
                <td><input type="text" name="password" placeholder="enter password here"></td>
            </tr>
            <tr>
                <th></th>
                <td>
                    <input type="submit" name="operation" value="signIn">
                    <input type="submit" name="operation" value="signUp">
                </td>
            </tr>
        </table>
    </div>
</form>
</body>
</html>
