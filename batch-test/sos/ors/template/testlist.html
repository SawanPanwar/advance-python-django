<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
{% include "header.html" %}
<form>
    <div align="center">
        <h1>Test List</h1>
    </div>
    <table border="1%" width="100%">
        <tr>
            <th>Id</th>
            <th>FirstName</th>
            <th>LastName</th>
            <th>Email</th>
            <th>Password</th>
        </tr>
       {% for l in list %}
         <tr align="center">
            <td>{{ l.id }}</td>
            <td>{{ l.firstName }}</td>
            <td>{{ l.lastName }}</td>
            <td>{{ l.email }}</td>
            <td>{{ l.password }}</td>
        </tr>
        {% endfor %}
    </table>
</form>
</body>
</html>
